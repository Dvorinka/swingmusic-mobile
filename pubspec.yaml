name: swingmusic_mobile
description: "SwingMusic Mobile - Flutter cross-platform music player"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1
  go_router: ^12.1.3
  just_audio: ^0.9.46
  audio_session: ^0.1.25
  permission_handler: ^11.4.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  dio: ^5.3.2
  retrofit: ^4.0.1
  json_annotation: ^4.8.1
  lottie: ^2.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Media & Metadata
  # flutter_media_metadata: ^1.0.0+1  # Removed due to namespace issues
  # flutter_taggy: ^2.1.0  # Version not found
  metadata_fetch: ^0.4.1
  
  # Visualizations
  flutter_audio_waveforms: ^1.2.0
  
  # QR Code
  mobile_scanner: ^5.0.0
  qr_flutter: ^4.1.0
  
  # UI Components
  cupertino_icons: ^1.0.8
  
  # Additional Utilities
  equatable: ^2.0.5
  uuid: ^4.2.1
  intl: ^0.20.2
  
  # Audio Service
  audio_service: ^0.18.12
  
  # Cache
  cached_network_image: ^3.3.0
  
  # File picker
  file_picker: ^8.0.0+1
  
  # Share
  share_plus: ^10.0.0
  
  # URL launcher
  url_launcher: ^6.3.0
  
  # HTTP requests
  http: ^1.1.0

  # Connectivity / network-aware quality + sync
  connectivity_plus: ^6.0.5
  
  # Background tasks
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0
  
  # Testing
  mockito: ^5.4.2
  
  # Code Generation
  retrofit_generator: ^7.0.8
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
